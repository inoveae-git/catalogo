<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moni Semi Joias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfaf7; }
        .font-luxury { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-stone-100">
        <h1 class="text-xl font-luxury tracking-widest text-stone-700">MONI</h1>
        <button onclick="document.getElementById('cart-modal').classList.toggle('hidden')" class="relative p-2 bg-stone-50 rounded-full">
            🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-[#b08d57] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="vitrine" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-stone-400">Sincronizando produtos...</p>
        </div>
    </main>

    <!-- Carrinho -->
    <div id="cart-modal" class="fixed inset-0 bg-black/60 hidden z-[100] backdrop-blur-sm">
        <div class="bg-white w-[85%] max-w-sm ml-auto h-full p-6 flex flex-col shadow-2xl">
            <h2 class="text-lg font-luxury border-b pb-4 mb-4">Meu Pedido</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 text-sm"></div>
            <div class="mt-6 border-t pt-6">
                <div class="flex justify-between text-lg font-bold mb-6">
                    <span>Total:</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold uppercase text-xs shadow-lg">Finalizar no WhatsApp</button>
                <button onclick="document.getElementById('cart-modal').classList.add('hidden')" class="w-full text-stone-400 text-[10px] mt-4 uppercase">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let produtos = [];
        let cart = [];

        // Carrega os produtos do arquivo JSON automaticamente
        async function load() {
            try {
                // O site busca o arquivo no mesmo repositório
                const response = await fetch('produtos.json?v=' + Date.now());
                produtos = await response.json();
                render();
            } catch (e) {
                document.getElementById('vitrine').innerHTML = "Erro ao carregar lista de produtos.";
            }
        }

        function render() {
            const v = document.getElementById('vitrine');
            v.innerHTML = produtos.map((p, i) => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 flex flex-col h-full">
                    <img src="${p.img}" class="w-full h-40 object-cover">
                    <div class="p-3 flex flex-col flex-1">
                        <h3 class="text-[10px] font-bold uppercase text-stone-500 truncate mb-1">${p.nome}</h3>
                        <p class="text-sm font-bold text-stone-900 mb-3">R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</p>
                        <button onclick="add(${i})" class="mt-auto bg-stone-900 text-white py-2 rounded-lg text-[10px] font-bold uppercase active:bg-stone-600 transition">Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        function add(i) {
            cart.push(produtos[i]);
            update();
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center gap-2 border-b border-stone-50 pb-2">
                    <img src="${item.img}" class="w-8 h-8 rounded object-cover">
                    <span class="flex-1 truncate uppercase text-[9px] font-bold">${item.nome}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold">R$ ${parseFloat(item.preco).toFixed(2)}</span>
                        <button onclick="cart.splice(${index},1);update()" class="text-red-300">✕</button>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + parseFloat(i.preco), 0);
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function sendWhatsApp() {
            if(!cart.length) return;
            let msg = "*NOVO PEDIDO - MONI SEMI JOIAS*\n\n" + cart.map(i => `💍 ${i.nome} - R$ ${i.preco}`).join('\n');
            msg += `\n\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/5591999420403?text=${encodeURIComponent(msg)}`);
        }

        load();
    </script>
</body>
</html>
